<!DOCTYPE html>
  <head>
    <script>
      var _paq = (window._paq = window._paq || []);
      /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
      _paq.push(["trackPageView"]);
      _paq.push(["enableLinkTracking"]);
      (function () {
        var u = "https://analytics.skimap.org/";
        _paq.push(["setTrackerUrl", u + "matomo.php"]);
        _paq.push(["setSiteId", "4"]);
        var d = document,
          g = d.createElement("script"),
          s = d.getElementsByTagName("script")[0];
        g.async = true;
        g.src = u + "matomo.js";
        s.parentNode.insertBefore(g, s);
      })();
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      names="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta charset="utf-8" />
    <title>OpenSkiMap.org</title>
    <meta
      name="description"
      content="Explore downhill, nordic & backcountry skiing worldwide using this interactive map based on open data."
    />
  </head>
  <body>
    <div id="sidebar"></div>
    <div id="map"></div>
    <div id="search-bar"></div>
    <div id="about-modal"></div>
    <div id="legal-modal"></div>
    <div id="settings-modal"></div>
    <div id="layers-modal"></div>
    <div id="legend-modal"></div>
    <div id="track-drawing-controls"></div>
    <div id="gpx-drop-zone"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
